# ballotprocessor.properties
ballot.store=../_elections/2026-primary-dems/ballotprocessor-store/
# ElectionType (see ElectionType enum. Primary, General)
election.type=Primary
# Endorsed party (see Party enum. (case-sensitive))
endorsed.party=Democratic
# name given to endorsements file in chester-contests directory
endorsements.all.file.name=all-endorsements.csv
# regex to extract election title from ballot text.
ballot.election.text.regex=(?mi)(?<title>^GENERAL PRIMARY ELECTION DEMOCRATIC BALLOT\n^COUNTY OF CHESTER, COMMONWEALTH OF PENNSYLVANIA$\n(.*\n){2})
# regex to separate specimen text into precinct ballot text.
ballot.text.regex=(?m)^(?<id>\\d+) (?<name>.*) DEM\n^OFFICIAL CHESTER COUNTY$\n
# regex to detect VoteFors on page 2 of ballot.
ballot.page.break.regex=(?m)Vote Both Sides
# string literal to mark end of candidate list.
ballot.write.in=Write-in\n
# regex to extract ballot text for one-page ballots.
ballot.onepage.text.regex=(?m)((.*\n)*^by regular ballot.\n)(?<page>((.*)\n)*^Chester County$)
# regexes to extract ballot text for two-page ballots. NOT ALWAYS USED!
# Page 1 ends with "Vote Both Sides" and page 2 starts with "Vote Both Sides".
ballot.twopage.text.p1.regex=(?m)((.*\n)*^(Vote Both Sides\n))(?<page>((.*)\n)*)^Vote Both Sides$
ballot.twopage.text.p2.regex=(?m)(^Vote Both Sides$\n)(.*\n)*(^Vote Both Sides$\n)(?<page>((.*)\n)*)^Review$
# regexes to extract Contest title and text. Order is IMPORTANT.
# Format 1 usually matches long contest titles ONLY.
# Format 2 usually matches short contest titles.
# Format 1 has precedence over Format 2. If Format 1 matches, Format 2 is not attempted.
ballot.contest.text.regex.1=^(?<title>Member of Democratic\nState Committee\n)(?<instructions>^Vote(.*\n)*?^number of votes shall be elected\n)(?<candidates>((.*\n){1})*?)^Write-in$
ballot.contest.text.regex.2=^(?<title>(.*\n){1,3})(?<instructions>^Vote.*)\n(?<candidates>((.*\n){1})*?)^Write-in$
# regex to extract Referendum title and text.
ballot.referendum.text.regex=(?mi)^(?<title>((.*\n).*Referendum.*\n))(?<text>(.*\n)*?)^YES$\nNO$
# regexes to extract Retention title and judge name.
ballot.retention.text.regex=(?mi)^(?<title>.*Retention\nElection Question$)(?<question>((.*)\n)*?)^YES\nNO
ballot.retention.name.regex=(?mi)((.*)\n)*^Shall (?<name>(.*)?) be retained.*\n

# Used by CandidateFactory class
# These values are for exceptional cases.
# It's not clear if all of the exceptions have been identified.
ticket.contest.titles=\
	GOVERNOR AND LIEUTENANT GOVERNOR,\
	PRESIDENTIAL ELECTORS
	# Contests with no region line below candidate name
local.contest.titles=\
	DEMOCRATIC COUNTY COMMITTEE MEMBER,\
	PRESIDENTIAL ELECTORS,\
	AUDITOR,\
	CONSTABLE,\
	DEMOCRATIC COUNTY COMMISSIONER,\
	INSPECTOR OF ELECTIONS,\
	JUDGE OF ELECTIONS,\
	MAGISTERIAL DISTRICT JUDGE,\
	MAYOR,\
	TAX COLLECTOR,\
	SCHOOL DIRECTOR,\
	MEMBER OF COUNCIL,\
	TOWNSHIP SUPERVISOR,\
	TOWNSHIP COMMISSIONER
local.contest.exception.titles=\
	AUDITOR GENERAL,\
	SCHOOL DIRECTOR OCTORARA REGION 1,\
	SCHOOL DIRECTOR UNIONVILLE CHADDS FORD REGION C,\
	SCHOOL DIRECTOR TWIN VALLEY REGION 2,\
	SCHOOL DIRECTOR WEST CHESTER REGION 3,\
	SCHOOL DIRECTOR SPRING FORD REGION 3
